version: "3.9"

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: docu_store-umami
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami@umami-db:5432/umami
      TRACKER_SCRIPT_NAME: ds-analytics
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - docu_store-network

  umami-db:
    image: postgres:16-alpine
    container_name: docu_store-umami-db
    volumes:
      - umami_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    networks:
      - docu_store-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  umami_data:

networks:
  docu_store-network:
    external: true
